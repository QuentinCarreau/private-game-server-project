spring.application.name=demo

# Database Configuration (override par docker-compose pour le conteneur)
spring.datasource.url=jdbc:postgresql://localhost:5432/gameserver
spring.datasource.username=user
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
# "create" : Hibernate DROP + CREATE les tables au démarrage, ne les supprime pas à l'arrêt.
# C'est le bon choix pour le dev avec Docker (le volume DB persiste).
# Passer à "validate" ou "none" en production.
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# data.sql est exécuté APRÈS que Hibernate ait créé les tables (obligatoire)
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
