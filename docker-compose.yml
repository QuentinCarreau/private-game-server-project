services:
  db:
    image: postgres:15
    container_name: game-server-db
    environment:
      POSTGRES_DB: gameserver
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d gameserver"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./demo
    container_name: game-server-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/gameserver
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: game-server-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
